<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Core Mining Ring Showcase</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
    body { font-family: "Share Tech Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    #showcase-root { position: fixed; inset: 0; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: fixed; inset: 0; pointer-events: none; color: #eaffff;
      text-shadow: 0 0 14px rgba(80, 230, 255, .32), 0 1px 3px rgba(0,0,0,.8);
    }
    .title {
      position: absolute; left: 48px; top: 38px;
      font-size: 24px; font-weight: 700; letter-spacing: 2.2px; color: #fff;
    }
    .title span { color: #ffcf72; }
    .readout {
      position: absolute; left: 48px; bottom: 42px; min-width: 420px;
      border-left: 2px solid rgba(255, 207, 114, .8); padding-left: 18px;
    }
    .eyebrow { color: #9fffb0; font-size: 12px; letter-spacing: 1.5px; opacity: .82; }
    .name {
      margin-top: 7px; color: #fff; font-family: Orbitron, "Share Tech Mono", monospace;
      font-size: 30px; letter-spacing: .8px;
    }
    .meta {
      margin-top: 8px; color: #aee9ff; font-size: 13px; letter-spacing: 1.2px; opacity: .86;
    }
    .right {
      position: absolute; right: 48px; bottom: 42px; text-align: right;
      color: #aee9ff; font-size: 12px; letter-spacing: 1.3px; opacity: .82;
    }
    .right strong {
      display: block; margin-top: 6px; color: #fff; font-size: 17px; letter-spacing: 1.6px;
    }
    .scanline {
      position: absolute; left: 50%; bottom: 44px; width: 240px; height: 4px;
      transform: translateX(-50%); border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,207,114,.18), rgba(255,207,114,.92), rgba(78,232,255,.8), rgba(78,232,255,.16));
      box-shadow: 0 0 16px rgba(255, 207, 114, .28);
    }
  </style>
</head>
<body>
  <div id="showcase-root"></div>
  <div class="hud" aria-hidden="true">
    <div class="title">CLAUDE CITIZEN <span>HOLDER VISUAL</span></div>
    <div class="readout">
      <div class="eyebrow">T3 DEEP-CORE MINING RIG · VISUAL ONLY</div>
      <div class="name">Deep Core Mining Ring</div>
      <div class="meta">oversized refinery drum · amber ore core · heavy twin drills</div>
    </div>
    <div class="scanline"></div>
    <div class="right">BASE CLASS<strong>MINER</strong></div>
  </div>
  <script type="module" src="/src/social/abyssalDrillerShowcase.ts"></script>
</body>
</html>
