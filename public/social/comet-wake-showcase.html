<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comet Wake Kit Showcase</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
    body { font-family: "Share Tech Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    #showcase-root { position: fixed; inset: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: fixed; inset: 0; pointer-events: none; color: #eaffff;
      text-shadow: 0 0 14px rgba(80, 230, 255, .32), 0 1px 3px rgba(0,0,0,.8);
    }
    .title {
      position: absolute; left: 48px; top: 36px; letter-spacing: 2.4px;
      font-size: 22px; font-weight: 700; color: #fff;
    }
    .title span { color: #9fffb0; }
    .hud-card {
      position: absolute; left: 48px; bottom: 42px; min-width: 360px;
      border-left: 2px solid rgba(159, 255, 176, .72);
      padding: 0 0 0 18px;
    }
    .slot {
      color: #9fffb0; opacity: .78; font-size: 12px; letter-spacing: 1.6px;
    }
    #rarity {
      margin-top: 8px; font-size: 18px; letter-spacing: 2px; font-weight: 700;
    }
    #variant {
      margin-top: 5px; color: #fff; font-size: 28px; letter-spacing: .8px;
      font-family: Orbitron, "Share Tech Mono", ui-monospace, monospace;
    }
    .ship-readout {
      position: absolute; right: 48px; bottom: 42px; text-align: right;
      color: #aee9ff; font-size: 12px; letter-spacing: 1.4px; opacity: .82;
    }
    .ship-readout strong {
      display: block; color: #fff; margin-top: 6px; font-size: 17px; letter-spacing: 1.7px;
    }
    .grade-rail {
      position: absolute; left: 50%; bottom: 44px; transform: translateX(-50%);
      display: grid; grid-template-columns: repeat(4, 54px); gap: 8px;
    }
    .grade-step {
      height: 4px; border-radius: 999px; background: rgba(174, 233, 255, .16);
      box-shadow: 0 0 0 1px rgba(174, 233, 255, .12);
    }
    .grade-step.past,
    .grade-step.active {
      background: rgba(159, 255, 176, .78);
      box-shadow: 0 0 14px rgba(159, 255, 176, .34);
    }
    .grade-step.active { background: #fff; }
  </style>
</head>
<body>
  <div id="showcase-root"></div>
  <div class="hud" aria-hidden="true">
    <div class="title">CLAUDE CITIZEN <span>FLIGHT CAPTURE</span></div>
    <div class="hud-card">
      <div class="slot">TRAIL SLOT ONLY · COMET WAKE KIT</div>
      <div id="rarity">COMMON</div>
      <div id="variant">Dust Comet Wake</div>
    </div>
    <div class="grade-rail">
      <div class="grade-step active"></div>
      <div class="grade-step"></div>
      <div class="grade-step"></div>
      <div class="grade-step"></div>
    </div>
    <div class="ship-readout">SHIP CLASS<strong>INTERCEPTOR</strong></div>
  </div>
  <script type="module" src="/src/social/cometWakeShowcase.ts"></script>
</body>
</html>
